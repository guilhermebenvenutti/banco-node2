apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: guigotoso/banco-node-front:1.5
        ports:
          - containerPort: 3001
        env:
          - name: REACT_APP_API_URL
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: API_URL