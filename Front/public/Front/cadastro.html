<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco LOF - Cadastro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>Bem vindo ao banco da LOF</h1>
    <h2>Criar Conta</h2>
    
    <form id="cadastroForm">
      <input type="text" id="nome" placeholder="Nome completo (somente letras)" title="Digite apenas letras e espaços" required>
      <input type="text" id="cpf" placeholder="CPF (somente números)" maxlength="14" required>
      <input type="password" id="senha" placeholder="Senha" required>
      <input type="password" id="confirmaSenha" placeholder="Confirme sua Senha" required>
      <button type="submit">Cadastrar</button>
    </form>

    <p>Já tem conta? <a href="index.html">Faça login</a></p>
    <div id="mensagem" class="error"></div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
